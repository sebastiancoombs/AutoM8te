# ArduPilot SITL Configuration
# Each drone gets its own SITL instance on a separate TCP port.
# pymavlink connects via tcp:127.0.0.1:<port>

drones:
  - id: drone_1
    instance: 0
    tcp_port: 5760
    connection_string: "tcp:127.0.0.1:5760"
    description: "Primary drone (Swarm Leader)"

  - id: drone_2
    instance: 1
    tcp_port: 5770
    connection_string: "tcp:127.0.0.1:5770"
    description: "Secondary drone"

  - id: drone_3
    instance: 2
    tcp_port: 5780
    connection_string: "tcp:127.0.0.1:5780"
    description: "Tertiary drone"

  - id: drone_4
    instance: 3
    tcp_port: 5790
    connection_string: "tcp:127.0.0.1:5790"
    description: "Quaternary drone"

# SITL Instance Launch Settings
sitl:
  ardupilot_dir: "~/ardupilot"
  vehicle: "ArduCopter"
  home_location: "-35.363261,149.165230,584,353"  # Canberra (ArduPilot default)
  speedup: 10
  no_mavproxy: true

# Multi-drone: each instance offset 50m east from previous
# Instance 0: home location
# Instance 1: home + 50m east
# Instance 2: home + 100m east
# Instance 3: home + 150m east
spawn_offsets:
  spacing_m: 50
  direction: east  # offset direction for each successive instance
