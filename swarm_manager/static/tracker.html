<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AutoM8te Drone Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box }
body { font-family: -apple-system, system-ui, sans-serif; background: #111; color: #eee }
#map { height: 65vh; width: 100% }
#hud { padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap }
.drone-card { background: #22222a; border-radius: 10px; padding: 12px 16px; border: 1px solid #333; min-width: 160px; flex: 1 }
.drone-card .name { font-size: 14px; font-weight: 700; color: #4af; margin-bottom: 6px }
.drone-card .stat { font-size: 12px; color: #aaa; margin: 2px 0 }
.drone-card .stat b { color: #eee }
.armed-badge { color: #f44; font-weight: 700 }
.disarmed-badge { color: #666 }
#status { padding: 8px 16px; background: #18181f; font-size: 12px; color: #888; display: flex; justify-content: space-between; border-top: 1px solid #333 }
h1 { font-size: 16px; padding: 12px 16px; background: #18181f; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 8px }
h1 span { color: #4af }
#controls { padding: 10px 16px; display: flex; gap: 8px; background: #18181f }
#controls button { padding: 8px 20px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px }
.btn-takeoff { background: #2a6; color: #fff }
.btn-land { background: #c44; color: #fff }
.btn-rtl { background: #a80; color: #fff }
</style>
</head>
<body>
<h1>🚁 <span>AutoM8te</span> Swarm Tracker</h1>
<div id="controls">
  <button class="btn-takeoff" onclick="swarmCmd('takeoff',{altitude_m:10})">All Takeoff 10m</button>
  <button class="btn-land" onclick="swarmCmd('land',{})">All Land</button>
  <button class="btn-rtl" onclick="swarmCmd('return_home',{})">All RTL</button>
</div>
<div id="map"></div>
<div id="hud"></div>
<div id="status">
  <span id="drone-count">0 drones</span>
  <span id="updated">Connecting...</span>
</div>

<script>
const API = window.location.origin;
const map = L.map('map').setView([-35.3632, 149.1652], 18);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 22, attribution: 'OSM'
}).addTo(map);

const COLORS = ['#4af','#f44','#2a6','#a80','#c4f','#ff0','#0ff','#f80'];
const drones = {}; // drone_id → { marker, trail, label }
let centered = false;

function makeDroneIcon(id, idx) {
  return L.divIcon({
    html: `<div style="font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.6));position:relative">🚁<div style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:${COLORS[idx % COLORS.length]};white-space:nowrap;text-shadow:0 1px 3px #000">${id}</div></div>`,
    iconSize: [36, 36], iconAnchor: [18, 18], className: ''
  });
}

async function cmd(endpoint, body) {
  try {
    const r = await fetch(API + endpoint, {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
    });
    return await r.json();
  } catch(e) { console.error(e); }
}

function swarmCmd(action, params) {
  cmd('/api/swarm', { action, params });
}

async function poll() {
  try {
    const d = await cmd('/api/query', {});
    if (!d || d.status !== 'success') return;

    const droneList = d.drones || [];
    document.getElementById('drone-count').textContent = droneList.length + ' drones';

    let hudHtml = '';

    droneList.forEach((t, idx) => {
      const id = t.drone_id;
      const p = t.position;
      const lat = p.lat, lon = p.lon;

      // Create or update marker
      if (!drones[id]) {
        drones[id] = {
          marker: L.marker([lat, lon], {icon: makeDroneIcon(id, idx)}).addTo(map),
          trail: L.polyline([], {color: COLORS[idx % COLORS.length], weight: 2, opacity: 0.5}).addTo(map)
        };
      } else {
        drones[id].marker.setLatLng([lat, lon]);
      }

      drones[id].trail.addLatLng([lat, lon]);
      const latlngs = drones[id].trail.getLatLngs();
      if (latlngs.length > 300) drones[id].trail.setLatLngs(latlngs.slice(-300));

      if (!centered) { map.setView([lat, lon], 18); centered = true; }

      const gs = t.speed?.groundspeed_ms ?? (t.velocity ? Math.sqrt(t.velocity.north_ms**2 + t.velocity.east_ms**2) : 0);
      const alt = p.alt_rel_m?.toFixed(1) ?? '0.0';
      const bat = t.battery?.percent ?? t.battery?.remaining_pct ?? 100;
      const sats = t.gps?.satellites ?? 0;
      const armed = t.armed ? '<span class="armed-badge">ARMED</span>' : '<span class="disarmed-badge">DISARMED</span>';
      const mode = t.flight_mode ?? t.current_task ?? 'idle';

      hudHtml += `<div class="drone-card">
        <div class="name">${id}</div>
        <div class="stat">${armed} · <b>${mode}</b></div>
        <div class="stat">Alt: <b>${alt}m</b> · Spd: <b>${gs.toFixed(1)}m/s</b></div>
        <div class="stat">Bat: <b>${bat}%</b> · GPS: <b>${sats} sats</b></div>
      </div>`;
    });

    document.getElementById('hud').innerHTML = hudHtml;
    document.getElementById('updated').textContent = new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('updated').textContent = 'Error: ' + e.message;
  }
}

setInterval(poll, 500);
poll();
</script>
</body>
</html>
